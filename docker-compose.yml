services:
  user-service:
    build: ./services/user-service
    image: user-service:dev
    container_name: user-service
    restart: always
    ports:
      - "${USER_SERVICE_PORT}:${USER_SERVICE_PORT}"
    environment:
      - NODE_ENV=production
      - PORT=${USER_SERVICE_PORT}
      - MONGODB_URI=mongodb://${MONGO_ROOT_USERNAME}:${MONGO_ROOT_PASSWORD}@mongodb:27017/${USER_SERVICE_DB}?authSource=admin
    depends_on:
      mongodb:
        condition: service_healthy

  task-service:
    build: ./services/task-service
    image: task-service:dev
    container_name: task-service
    restart: always
    ports:
      - "${TASK_SERVICE_PORT}:${TASK_SERVICE_PORT}"
    environment:
      - NODE_ENV=production
      - PORT=${TASK_SERVICE_PORT}
      - MONGODB_URI=mongodb://${MONGO_ROOT_USERNAME}:${MONGO_ROOT_PASSWORD}@mongodb:27017/${TASK_SERVICE_DB}?authSource=admin
      - RABBITMQ_URI=amqp://${RABBITMQ_DEFAULT_USER}:${RABBITMQ_DEFAULT_PASS}@rabbitmq:${RABBITMQ_PORT}
    depends_on:
      mongodb:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  notification-service:
    build: ./services/notification-service
    image: notification-service:dev
    container_name: notification-service
    restart: always
    ports:
      - "${NOTIFICATION_SERVICE_PORT}:${NOTIFICATION_SERVICE_PORT}"
    environment:
      - NODE_ENV=production
      - PORT=${NOTIFICATION_SERVICE_PORT}
      - RABBITMQ_URI=amqp://${RABBITMQ_DEFAULT_USER}:${RABBITMQ_DEFAULT_PASS}@rabbitmq:${RABBITMQ_PORT}
    depends_on:
      rabbitmq:
        condition: service_healthy

  mongodb:
    image: mongodb/mongodb-community-server:8.0-ubi9-slim
    container_name: mongodb
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD}
    ports:
      - "27017:27017"
    healthcheck:
      test:
        - "CMD"
        - "mongosh"
        - "--quiet"
        - "-u"
        - "${MONGO_ROOT_USERNAME}"
        - "-p"
        - "${MONGO_ROOT_PASSWORD}"
        - "--authenticationDatabase"
        - "admin"
        - "--eval"
        - "db.adminCommand('ping').ok"
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - mongodb_data:/data/db

  rabbitmq:
    image: rabbitmq:4-management-alpine     # drop -management if you don't need the UI
    container_name: rabbitmq
    restart: always
    ports:
      - "${RABBITMQ_PORT}:${RABBITMQ_PORT}" # AMQP
      - "15672:15672"                       # Management UI (only with -management)
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS}
      RABBITMQ_DEFAULT_VHOST: ${RABBITMQ_DEFAULT_VHOST}
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq

volumes:
  mongodb_data:
  rabbitmq_data:
